name: Octave Tests

on:
  push:
    branches: [master, integration/*, refactor/*]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave
      
      - name: Run tests
        run: octave --no-gui --eval "run('tests/test_all.m')"
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: octave-test-results
          path: Simulation_Scripts/tests/
