name: MATLAB Tests

on:
  push:
    branches: [master, integration/*, refactor/*]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: latest
          cache: true

      - name: Run test suite
        uses: matlab-actions/run-command@v3
        with:
          command: run('tests/test_all.m')

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matlab-test-results
          path: tests/
